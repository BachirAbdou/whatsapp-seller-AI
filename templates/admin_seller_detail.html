{% extends "admin_base.html" %}

{% block content %}

<h1 class="text-3xl font-bold mb-8">
{{ seller.name }}
</h1>

<div class="grid grid-cols-3 gap-6 mb-10">

<div class="card">
<p class="text-slate-400">Email</p>
<p class="mt-2">{{ seller.email }}</p>
</div>

<div class="card">
<p class="text-slate-400">Produits</p>
<p class="text-2xl mt-2">{{ products|length }}</p>
</div>

<div class="card">
<p class="text-slate-400">Commandes</p>
<p class="text-2xl mt-2">{{ orders|length }}</p>
</div>

</div>

<div class="card">

<h2 class="text-xl font-bold mb-4">
Produits
</h2>

<table class="w-full">

{% for p in products %}

<tr class="border-b border-slate-700">

<td class="py-3">{{ p.name }}</td>
<td>{{ p.price }} CFA</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
