<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Créer un compte — NovaSell</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Inter',sans-serif;
background:#0a0f1e;color:white;
min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
padding:40px 24px;
}
body::before{
content:'';position:fixed;inset:0;
background:radial-gradient(ellipse 80% 60% at 20% -10%,rgba(99,102,241,0.15) 0%,transparent 60%),
           radial-gradient(ellipse 60% 40% at 80% 110%,rgba(99,102,241,0.1) 0%,transparent 60%);
pointer-events:none;z-index:0;
}
.logo{
position:fixed;top:24px;left:40px;
font-weight:700;font-size:20px;text-decoration:none;color:white;z-index:10;
}
.logo span{color:#818cf8;}

.card{
position:relative;z-index:1;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
border-radius:24px;padding:48px 40px;
width:100%;max-width:440px;
}
.card-header{text-align:center;margin-bottom:32px;}
.card-header .badge{
display:inline-flex;align-items:center;gap:6px;
background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.25);
border-radius:100px;padding:5px 14px;
font-size:12px;font-weight:500;color:#a5b4fc;margin-bottom:16px;
}
.card-header h1{font-size:26px;font-weight:700;letter-spacing:-0.5px;margin-bottom:8px;}
.card-header p{font-size:14px;color:rgba(255,255,255,0.45);}

.alert-error{
background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);
color:#fca5a5;border-radius:10px;padding:12px 16px;font-size:13px;margin-bottom:20px;
}

.field{margin-bottom:14px;}
.field label{display:block;font-size:13px;font-weight:500;color:rgba(255,255,255,0.6);margin-bottom:6px;}
.field input{
width:100%;background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:10px;padding:12px 16px;
color:white;font-size:15px;font-family:'Inter',sans-serif;
transition:border-color 0.2s,background 0.2s;outline:none;
}
.field input:focus{border-color:rgba(99,102,241,0.5);background:rgba(99,102,241,0.05);}
.field input::placeholder{color:rgba(255,255,255,0.25);}
.field-hint{font-size:11px;color:rgba(255,255,255,0.3);margin-top:4px;}
.field-password{position:relative;}
.field-password input{padding-right:48px;}
.eye-btn{
position:absolute;right:14px;top:50%;transform:translateY(-50%);
background:none;border:none;cursor:pointer;
color:rgba(255,255,255,0.35);font-size:16px;padding:4px;transition:color 0.2s;
}
.eye-btn:hover{color:rgba(255,255,255,0.7);}

.btn-submit{
width:100%;background:#6366f1;color:white;
border:none;border-radius:10px;padding:14px;
font-size:15px;font-weight:600;font-family:'Inter',sans-serif;
cursor:pointer;transition:all 0.2s;
display:flex;align-items:center;justify-content:center;gap:8px;
margin-top:8px;
}
.btn-submit:hover:not(:disabled){background:#4f46e5;transform:translateY(-1px);}
.btn-submit:disabled{opacity:0.6;cursor:not-allowed;}

.spinner{
width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);
border-top-color:white;border-radius:50%;
animation:spin 0.7s linear infinite;display:none;
}
@keyframes spin{to{transform:rotate(360deg);}}

.terms{
font-size:12px;color:rgba(255,255,255,0.3);
text-align:center;margin-top:16px;line-height:1.6;
}

.divider{
display:flex;align-items:center;gap:12px;
margin:24px 0;color:rgba(255,255,255,0.2);font-size:12px;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.08);}

.link-bottom{text-align:center;font-size:14px;color:rgba(255,255,255,0.4);}
.link-bottom a{color:#818cf8;text-decoration:none;font-weight:500;}
.link-bottom a:hover{text-decoration:underline;}

input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus{
-webkit-box-shadow:0 0 0 1000px #111827 inset !important;
-webkit-text-fill-color:white !important;
caret-color:white;
}
</style>
</head>
<body>

<a class="logo" href="/">Nova<span>Sell</span></a>

<div class="card">
  <div class="card-header">
    <div class="badge">✦ 7 jours gratuits</div>
    <h1>Créez votre assistant WhatsApp</h1>
    <p>Prêt en moins de 5 minutes — sans carte bancaire</p>
  </div>

  {% if error %}
  <div class="alert-error">{{ error }}</div>
  {% endif %}

  <form action="/register" method="post" id="registerForm">

    <div class="field">
      <label>Nom de la boutique</label>
      <input name="name" placeholder="Ex: Boutique Aminata" required />
    </div>

    <div class="field">
      <label>Nom de votre assistant</label>
      <input name="assistant_name" placeholder="Ex: Nora, Lina, Karim..." required />
      <div class="field-hint">C'est le nom que verra vos clients sur WhatsApp</div>
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" name="email" placeholder="vous@exemple.com" required />
    </div>

    <div class="field">
      <label>Mot de passe</label>
      <div class="field-password">
        <input id="password" type="password" name="password" placeholder="••••••••" required />
        <button type="button" class="eye-btn" onclick="togglePassword('password','eyeIcon')" id="eyeIcon">👁</button>
      </div>
    </div>

    <div class="field">
      <label>Confirmer le mot de passe</label>
      <div class="field-password">
        <input id="confirm_password" type="password" placeholder="••••••••" required />
        <button type="button" class="eye-btn" onclick="togglePassword('confirm_password','eyeIconConfirm')" id="eyeIconConfirm">👁</button>
      </div>
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">
      <span id="btnText">Créer mon compte gratuit</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <p class="terms">En créant un compte, vous acceptez nos conditions d'utilisation.</p>

  </form>

  <div class="divider">ou</div>

  <div class="link-bottom">
    Déjà un compte ? <a href="/login">Se connecter</a>
  </div>
</div>

<script>
function togglePassword(inputId, iconId){
  const input = document.getElementById(inputId)
  const icon = document.getElementById(iconId)
  if(input.type === "password"){input.type="text";icon.textContent="🙈"}
  else{input.type="password";icon.textContent="👁"}
}

document.getElementById("registerForm").addEventListener("submit", function(e){
  const pwd = document.getElementById("password").value
  const confirm = document.getElementById("confirm_password").value
  if(pwd !== confirm){
    e.preventDefault()
    alert("Les mots de passe ne correspondent pas")
    return
  }
  const btn = document.getElementById("submitBtn")
  const text = document.getElementById("btnText")
  const spinner = document.getElementById("spinner")
  btn.disabled = true
  text.textContent = "Création en cours..."
  spinner.style.display = "block"
})
</script>
</body>
</html>
