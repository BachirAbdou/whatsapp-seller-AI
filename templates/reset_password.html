<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Réinitialiser le mot de passe</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body{
    font-family:'Inter',sans-serif;
    background:#0f172a;
}
.blur-bg{
    position:absolute;
    width:700px;
    height:700px;
    background:radial-gradient(circle,#6366f1 0%,transparent 70%);
    filter:blur(120px);
    top:-200px;
    left:-200px;
    z-index:-1;
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen text-white">

<div class="blur-bg"></div>

<div class="bg-slate-900 p-10 rounded-2xl shadow-2xl w-96 border border-slate-700">

<h1 class="text-2xl font-bold mb-6 text-center">Nouveau mot de passe 🔒</h1>
<p class="text-slate-400 text-sm mb-6 text-center">Choisissez un nouveau mot de passe sécurisé</p>

{% if error %}
<div class="bg-red-500/20 text-red-300 p-3 rounded mb-4 text-sm text-center">
    {{ error }}
</div>
{% endif %}

{% if success %}
<div class="bg-green-500/20 text-green-300 p-3 rounded mb-4 text-sm text-center">
    {{ success }}
</div>
<script>
    // redirection après 3 secondes
    setTimeout(() => {
        window.location.href = "/login";
    }, 3000);
</script>
{% endif %}

<form action="/reset-password" method="post">
<input type="hidden" name="token" value="{{ token }}">

<div class="relative mb-4">
    <input id="password" type="password" name="password" placeholder="Nouveau mot de passe" required
        class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 pr-12 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    <button type="button" onclick="togglePassword('password', 'eyePassword')" id="eyePassword"
        class="absolute right-3 top-1/2 transform -translate-y-1/2 text-slate-400 hover:text-white">👁</button>
</div>

<div class="relative mb-4">
    <input id="confirm_password" type="password" name="confirm_password" placeholder="Confirmer le mot de passe" required
        class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 pr-12 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    <button type="button" onclick="togglePassword('confirm_password', 'eyeConfirm')" id="eyeConfirm"
        class="absolute right-3 top-1/2 transform -translate-y-1/2 text-slate-400 hover:text-white">👁</button>
</div>

<button class="w-full bg-indigo-600 hover:bg-indigo-700 p-3 rounded-lg font-medium transition">Changer le mot de passe</button>
</form>

<script>
function togglePassword(inputId, buttonId) {
    const input = document.getElementById(inputId)
    const icon = document.getElementById(buttonId)
    if (input.type === "password") {
        input.type = "text"
        icon.textContent = "🙈"
    } else {
        input.type = "password"
        icon.textContent = "👁"
    }
}
</script>

</div>
</body>
</html>
