<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mot de passe oublié</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Inter',sans-serif;
background:#0f172a;
}

.blur-bg{
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle,#6366f1 0%,transparent 70%);
filter:blur(120px);
top:-200px;
left:-200px;
z-index:-1;
}
</style>

</head>

<body class="flex items-center justify-center min-h-screen text-white">

<div class="blur-bg"></div>

<div class="bg-slate-900 p-10 rounded-2xl shadow-2xl w-96 border border-slate-700">

<h1 class="text-2xl font-bold mb-6 text-center">
Mot de passe oublié 🔑
</h1>

<p class="text-slate-400 text-sm mb-6 text-center">
Entrez votre email pour recevoir un lien de réinitialisation
</p>

{% if message %}
<div class="bg-green-500/20 text-green-300 p-3 rounded mb-4 text-sm">
{{ message }}
</div>
{% endif %}

<form method="post" action="/forgot-password">

<input
type="email"
name="email"
placeholder="Votre email"
required
class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-500"
/>

<button
class="w-full bg-indigo-600 hover:bg-indigo-700 p-3 rounded-lg font-medium transition">

Envoyer le lien

</button>

</form>

<a href="/login"
class="block text-center text-indigo-400 mt-6 hover:underline text-sm">

Retour à la connexion

</a>

</div>

</body>
</html>
